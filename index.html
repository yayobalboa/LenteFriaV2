<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LenteFría DAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fff; } 
        .text-cyan-lf { color: #00B7F1; } 
        .bg-cyan-lf { background-color: #00B7F1; }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center">
        <div class="bg-white p-12 rounded-3xl w-96 shadow-2xl">
            <h1 class="font-black text-4xl tracking-tighter text-center mb-8">LENTE<span class="text-cyan-lf">FRÍA</span></h1>
            <p id="login-error" class="text-red-500 text-sm font-bold text-center mb-4 hidden"></p>
            <input id="l-user" placeholder="Email o Usuario" class="mb-4 p-4 bg-slate-100 rounded-xl w-full outline-none focus:ring-2 focus:ring-cyan-lf">
            <input id="l-pass" type="password" placeholder="Contraseña" class="mb-8 p-4 bg-slate-100 rounded-xl w-full outline-none focus:ring-2 focus:ring-cyan-lf">
            <button onclick="login()" id="btn-login" class="w-full bg-black text-white p-4 rounded-xl font-bold hover:bg-cyan-lf transition-all">INICIAR SESIÓN</button>
        </div>
    </div>

    <nav id="main-nav" class="p-6 border-b flex justify-between items-center hidden">
        <h1 class="font-black text-2xl tracking-tighter">LENTE<span class="text-cyan-lf">FRÍA</span></h1>
        <div class="flex items-center gap-6">
            <span id="user-greeting" class="text-xs font-bold text-slate-400"></span>
            <button id="nav-staff-btn" onclick="show('admin')" class="text-xs font-bold uppercase text-slate-400 hover:text-cyan-lf hidden">Staff</button>
            <button onclick="show('galleries')" class="text-xs font-bold uppercase text-black">Galerías</button>
            <button onclick="logout()" class="text-xs font-bold uppercase text-red-500 ml-4"><i class="fa-solid fa-power-off"></i></button>
        </div>
    </nav>

    <main id="main-content" class="max-w-6xl mx-auto p-10 hidden">
        <section id="section-admin" class="hidden">
            <div class="bg-slate-900 p-10 rounded-3xl text-white flex justify-between items-center mb-10">
                <h2 class="text-2xl font-bold">Staff LenteFría</h2>
                <button onclick="document.getElementById('m-u').classList.remove('hidden')" class="bg-cyan-lf px-6 py-2 rounded-xl font-bold">+ NUEVO</button>
            </div>
            <div id="staff-list" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>

        <section id="section-galleries">
            <div class="flex justify-between items-end mb-10">
                <h2 class="text-5xl font-black">Entregas</h2>
                <button id="btn-new-vault" onclick="openGalleryModal()" class="bg-black text-white px-8 py-4 rounded-3xl font-bold hover:bg-cyan-lf transition-all hidden">NUEVA BÓVEDA</button>
            </div>
            <div id="galleries-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
        </section>
    </main>

    <div id="m-u" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
        <div class="bg-white p-10 rounded-3xl w-96 shadow-2xl">
            <h3 class="font-bold text-xl mb-4">Nuevo Staff</h3>
            <input id="sN" placeholder="Nombre completo" class="mb-4 p-4 bg-slate-100 rounded-xl w-full outline-none">
            <input id="sE" placeholder="Email del fotógrafo" class="mb-4 p-4 bg-slate-100 rounded-xl w-full outline-none">
            <input id="sP" placeholder="Contraseña de acceso" type="password" class="mb-6 p-4 bg-slate-100 rounded-xl w-full outline-none">
            <button id="btn-create-staff" onclick="apiS()" class="w-full bg-black text-white p-4 rounded-xl font-bold hover:bg-cyan-lf">CREAR STAFF</button>
            <button onclick="this.parentElement.parentElement.classList.add('hidden')" class="w-full mt-4 text-slate-400 font-bold">CANCELAR</button>
        </div>
    </div>

    <div id="m-g" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
        <div class="bg-white p-10 rounded-3xl w-96 shadow-2xl">
            <h3 class="font-bold text-xl mb-4">Nueva Bóveda</h3>
            <select id="sel-staff" class="mb-4 p-4 bg-slate-100 rounded-xl w-full outline-none font-bold text-sm">
                <option value="">Selecciona Fotógrafo...</option>
            </select>
            <input id="cN" placeholder="Nombre del Cliente" class="mb-4 p-4 bg-slate-100 rounded-xl w-full outline-none">
            <input id="sl" placeholder="Slug (Ej: boda-carlos)" class="mb-4 p-4 bg-slate-100 rounded-xl w-full outline-none">
            <input id="ps" placeholder="Contraseña de acceso cliente" class="mb-6 p-4 bg-slate-100 rounded-xl w-full outline-none">
            <button id="btn-create-vault" onclick="apiG()" class="w-full bg-cyan-lf text-white p-4 rounded-xl font-bold hover:bg-black">CREAR BÓVEDA</button>
            <button onclick="this.parentElement.parentElement.classList.add('hidden')" class="w-full mt-4 text-slate-400 font-bold">CANCELAR</button>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzAEygb5pHlQ08emz8KqvEnYFl9uMv_4WhzYTEk8tqxdxfIxc8IYKq9c5iFv7EicfO4/exec";

        let sessionUser = null;
        let sessionRole = null;
        let allStaffCache = [];

        async function gasRequest(action, payload = null, extra = null) {
            let url = `${GAS_URL}?action=${action}`;
            if (extra) url += `&extra=${extra}`;

            if (payload === null) {
                const r = await fetch(url);
                return await r.json();
            } else {
                const r = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: action, payload: payload })
                });
                return await r.json();
            }
        }

        async function login() {
            const userIn = document.getElementById('l-user').value;
            const passIn = document.getElementById('l-pass').value;
            const btn = document.getElementById('btn-login');
            const err = document.getElementById('login-error');

            if(!userIn || !passIn) return;
            
            btn.innerText = "VERIFICANDO...";
            err.classList.add('hidden');

            try {
                const res = await gasRequest("login", { email: userIn, password: passIn });
                
                if(res.success) {
                    sessionUser = res.user;
                    sessionRole = res.role;
                    
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('main-nav').classList.remove('hidden');
                    document.getElementById('main-content').classList.remove('hidden');
                    document.getElementById('user-greeting').innerText = `HOLA, ${sessionUser.full_name.toUpperCase()}`;

                    if(sessionRole === 'admin') {
                        document.getElementById('nav-staff-btn').classList.remove('hidden');
                        document.getElementById('btn-new-vault').classList.remove('hidden');
                        show('admin');
                    } else {
                        document.getElementById('nav-staff-btn').classList.add('hidden');
                        document.getElementById('btn-new-vault').classList.add('hidden');
                        show('galleries');
                    }
                } else {
                    err.innerText = res.message;
                    err.classList.remove('hidden');
                }
            } catch (error) {
                err.innerText = "Error de conexión";
                err.classList.remove('hidden');
            }
            btn.innerText = "INICIAR SESIÓN";
        }

        function logout() {
            sessionUser = null;
            sessionRole = null;
            document.getElementById('l-user').value = '';
            document.getElementById('l-pass').value = '';
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('main-nav').classList.add('hidden');
            document.getElementById('main-content').classList.add('hidden');
        }

        function show(n) { 
            document.getElementById('section-admin').classList.toggle('hidden', n!=='admin'); 
            document.getElementById('section-galleries').classList.toggle('hidden', n!=='galleries'); 
            if(n==='admin') fetchS(); 
            if(n==='galleries') fetchG();
        }

        async function fetchS() {
            try {
                const d = await gasRequest("getStaff");
                if(!Array.isArray(d)) throw new Error("Datos no válidos");
                allStaffCache = d; 
                document.getElementById('staff-list').innerHTML = d.map(s => 
                    `<div class="bg-slate-50 p-6 rounded-3xl border"><h4 class="font-bold text-lg">${s.full_name}</h4><p class="text-xs text-slate-400 font-bold mt-1">${s.email}</p></div>`
                ).join('');
            } catch(e) { document.getElementById('staff-list').innerHTML = `<p class="text-red-500 font-bold">Error: ${e.message}</p>`; }
        }

        async function fetchG() {
            try {
                const extra = sessionRole === 'admin' ? null : sessionUser.id;
                const d = await gasRequest("getGalleries", null, extra);
                
                if(!Array.isArray(d)) throw new Error("Datos no válidos");
                
                if(d.length === 0) {
                    document.getElementById('galleries-grid').innerHTML = `<p class="text-slate-400 font-bold col-span-3">No hay bóvedas creadas.</p>`;
                    return;
                }

                document.getElementById('galleries-grid').innerHTML = d.map(g => 
                    `<div class="border p-6 rounded-3xl flex flex-col justify-between shadow-sm hover:shadow-lg transition-all bg-white">
                        <div>
                            <h3 class="font-bold text-xl">${g.client_name}</h3>
                            <p class="text-xs text-slate-400 mb-6 bg-slate-100 inline-block px-3 py-1 rounded-full mt-2">/${g.slug}</p>
                        </div>
                        <button onclick="up(${g.id})" id="b-${g.id}" class="w-full bg-black text-white p-4 rounded-xl hover:bg-cyan-lf transition-all text-xs font-bold tracking-widest">
                            SUBIR FOTOS
                        </button>
                    </div>`
                ).join('');
            } catch(e) { document.getElementById('galleries-grid').innerHTML = `<p class="text-red-500 font-bold">Error: ${e.message}</p>`; }
        }

        async function apiS() { 
            const n = document.getElementById('sN').value; 
            const e = document.getElementById('sE').value; 
            const p = document.getElementById('sP').value;
            if(!n || !e || !p) return alert("Llena todos los campos");

            const btn = document.getElementById('btn-create-staff');
            btn.innerText = "CREANDO...";
            btn.disabled = true;

            const res = await gasRequest("createStaff", { full_name: n, email: e, password: p });
            
            if (res.error) {
                alert("Error de Base de Datos: " + res.error);
                btn.innerText = "CREAR STAFF";
                btn.disabled = false;
                return;
            }

            document.getElementById('m-u').classList.add('hidden'); 
            document.getElementById('sN').value = ''; 
            document.getElementById('sE').value = ''; 
            document.getElementById('sP').value = '';
            btn.innerText = "CREAR STAFF";
            btn.disabled = false;
            fetchS(); 
        }

        async function openGalleryModal() {
            const sel = document.getElementById('sel-staff');
            sel.innerHTML = '<option value="">Selecciona Fotógrafo...</option>' + allStaffCache.map(s => `<option value="${s.id}">${s.full_name}</option>`).join('');
            document.getElementById('m-g').classList.remove('hidden');
        }

        async function apiG() { 
            const s_id = document.getElementById('sel-staff').value;
            const c = document.getElementById('cN').value; 
            const sl = document.getElementById('sl').value; 
            const p = document.getElementById('ps').value;
            if(!s_id || !c || !sl || !p) return alert("Llena todos los campos");
            
            const btn = document.getElementById('btn-create-vault');
            btn.innerText = "CREANDO...";
            btn.disabled = true;

            const res = await gasRequest("createGallery", { photographer_id: s_id, client_name: c, slug: sl, password: p, can_download: true });
            
            if (res.error) {
                alert("Error de Base de Datos: " + res.error);
                btn.innerText = "CREAR BÓVEDA";
                btn.disabled = false;
                return;
            }

            document.getElementById('m-g').classList.add('hidden'); 
            document.getElementById('cN').value = ''; document.getElementById('sl').value = ''; document.getElementById('ps').value = '';
            btn.innerText = "CREAR BÓVEDA";
            btn.disabled = false;
            fetchG(); 
        }

        function up(galleryId) {
            const input = document.createElement('input'); 
            input.type = 'file'; input.multiple = true; input.accept = "image/*";
            input.onchange = async e => {
                const btn = document.getElementById(`b-${galleryId}`); 
                const files = e.target.files;
                if(files.length === 0) return;

                btn.innerText = `Subiendo 0/${files.length}...`;
                btn.disabled = true; btn.classList.add("opacity-50");

                for(let i=0; i<files.length; i++) {
                    const file = files[i];
                    const reader = new FileReader();
                    const base64Promise = new Promise(res => reader.onload = () => res(reader.result.split(',')[1]));
                    reader.readAsDataURL(file);
                    const base64Data = await base64Promise;

                    btn.innerText = `Enviando ${i+1}/${files.length}...`;
                    try {
                        await gasRequest("uploadPhoto", { gallery_id: galleryId, filename: file.name, mimeType: file.type, base64Data: base64Data });
                    } catch (error) { console.error("Error", error); }
                }

                btn.innerText = "¡LISTO!"; btn.classList.remove("opacity-50");
                setTimeout(() => { btn.innerText = "SUBIR FOTOS"; btn.disabled = false; }, 3000);
            }; 
            input.click();
        }
    </script>
</body>
</html>

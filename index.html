<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>LenteFría Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .bg-cyan-lf { background-color: #00B7F1; }
    </style>
</head>
<body class="bg-white">
    <nav class="p-6 border-b flex justify-between items-center">
        <img src="logo.png" class="h-10">
        <div class="flex gap-6">
            <button onclick="show('admin')" class="text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-cyan-lf">Staff</button>
            <button onclick="show('galleries')" class="text-[10px] font-bold uppercase tracking-widest text-black">Galerías</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-10">
        <!-- SECCIÓN STAFF -->
        <section id="section-admin" class="hidden">
            <div class="bg-slate-900 p-10 rounded-[3rem] text-white flex justify-between items-center mb-10">
                <h2 class="text-2xl font-bold italic">Staff LenteFría</h2>
                <button onclick="document.getElementById('m-u').classList.remove('hidden')" class="bg-cyan-lf px-6 py-2 rounded-xl text-xs font-bold"> + NUEVO</button>
            </div>
            <div id="staff-list" class="grid grid-cols-3 gap-6"></div>
        </section>

        <!-- SECCIÓN GALERÍAS -->
        <section id="section-galleries">
            <div class="flex justify-between items-end mb-10">
                <h2 class="text-5xl font-black tracking-tighter">Entregas</h2>
                <button onclick="document.getElementById('m-g').classList.remove('hidden')" class="bg-black text-white px-8 py-4 rounded-3xl text-xs font-bold uppercase tracking-widest hover:bg-cyan-lf transition-all">Nueva Bóveda</button>
            </div>
            <div id="galleries-grid" class="grid grid-cols-3 gap-8"></div>
        </section>
    </main>

    <!-- MODAL STAFF -->
    <div id="m-u" class="hidden fixed inset-0 bg-black/50 backdrop-blur-md z-[100] flex items-center justify-center">
        <div class="bg-white p-10 rounded-[3rem] w-80">
            <input type="text" id="sN" placeholder="Nombre" class="w-full mb-4 p-4 bg-slate-100 rounded-2xl outline-none">
            <input type="email" id="sE" placeholder="Email" class="w-full mb-6 p-4 bg-slate-100 rounded-2xl outline-none">
            <button onclick="apiS()" class="w-full bg-black text-white py-4 rounded-2xl font-bold">CREAR</button>
            <button onclick="this.parentElement.parentElement.classList.add('hidden')" class="w-full text-xs mt-4 font-bold text-slate-400">CERRAR</button>
        </div>
    </div>

    <!-- MODAL GALERÍA -->
    <div id="m-g" class="hidden fixed inset-0 bg-black/50 backdrop-blur-md z-[100] flex items-center justify-center">
        <div class="bg-white p-10 rounded-[3rem] w-96">
            <input type="text" id="cN" placeholder="Cliente" class="w-full mb-4 p-4 bg-slate-100 rounded-2xl outline-none">
            <input type="text" id="sl" placeholder="Slug" class="w-full mb-4 p-4 bg-slate-100 rounded-2xl outline-none">
            <input type="text" id="ps" placeholder="Pass" class="w-full mb-6 p-4 bg-slate-100 rounded-2xl outline-none">
            <button onclick="apiG()" class="w-full bg-cyan-lf text-white py-4 rounded-2xl font-bold">INICIALIZAR</button>
            <button onclick="this.parentElement.parentElement.classList.add('hidden')" class="w-full text-xs mt-4 font-bold text-slate-400">CERRAR</button>
        </div>
    </div>

    <script>
        const BASE = "https://shiny-engine-p79vw5gqp9gc96w-8000.app.github.dev";

        function show(n) {
            document.getElementById('section-admin').classList.toggle('hidden', n!=='admin');
            document.getElementById('section-galleries').classList.toggle('hidden', n!=='galleries');
            if(n==='admin') fetchS();
        }

        async function fetchS() {
            const r = await fetch(`${BASE}/admin/staff`);
            const d = await r.json();
            document.getElementById('staff-list').innerHTML = d.map(s => `<div class="bg-slate-50 p-6 rounded-3xl border"><p class="text-cyan-lf font-bold text-[10px] uppercase">Staff</p><h4 class="font-bold">${s.full_name}</h4></div>`).join('');
        }

        async function fetchG() {
            const r = await fetch(`${BASE}/photographer/galleries`);
            const d = await r.json();
            document.getElementById('galleries-grid').innerHTML = d.map(g => `<div class="border p-6 rounded-[2.5rem] hover:border-cyan-lf transition-all"><div class="h-40 bg-slate-50 rounded-3xl mb-4 flex items-center justify-center"><i class="fa-solid fa-box text-slate-200"></i></div><h3 class="font-bold uppercase text-sm">${g.client_name}</h3><button onclick="uploadFilesReal(${g.id})" id="btn-${g.id}" class="w-full bg-black text-white py-3 rounded-xl text-[10px] font-bold uppercase mt-4 hover:bg-cyan-lf transition-all tracking-widest">Gestionar Activos</button></div>`).join('');
        }

        function uploadFilesReal(galleryId) {
            const input = document.createElement('input');
            input.type = 'file';
            input.multiple = true; 
            
            input.onchange = async e => {
                const files = e.target.files;
                const btn = document.getElementById(`btn-${galleryId}`);
                btn.innerText = "Subiendo fotos... espera";
                btn.classList.replace('bg-black', 'bg-cyan-lf');

                for(let file of files) {
                    const formData = new FormData();
                    formData.append('file', file);
                    await fetch(`${BASE}/vault/upload/${galleryId}`, {
                        method: 'POST',
                        body: formData
                    });
                }
                btn.innerText = "¡FOTOS SUBIDAS A DRIVE!";
                setTimeout(() => { btn.innerText = "Gestionar Activos"; btn.classList.replace('bg-cyan-lf', 'bg-black'); }, 3000);
            };
            input.click(); 
        }

        async function apiS() {
            await fetch(`${BASE}/admin/staff/create`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({full_name:document.getElementById('sN').value, email:document.getElementById('sE').value})});
            document.getElementById('m-u').classList.add('hidden'); fetchS();
        }

        async function apiG() {
            await fetch(`${BASE}/photographer/vault/create`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({client_name:document.getElementById('cN').value, slug:document.getElementById('sl').value, password:document.getElementById('ps').value, can_download:true})});
            document.getElementById('m-g').classList.add('hidden'); fetchG();
        }

        fetchG();
    </script>
</body>
</html>

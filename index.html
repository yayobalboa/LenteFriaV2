<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LenteFría DAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fff; } 
        .text-cyan-lf { color: #00B7F1; } 
        .bg-cyan-lf { background-color: #00B7F1; }
    </style>
</head>
<body>
    <nav class="p-6 border-b flex justify-between items-center">
        <h1 class="font-black text-2xl tracking-tighter">LENTE<span class="text-cyan-lf">FRÍA</span></h1>
        <div class="flex gap-6">
            <button onclick="show('admin')" class="text-xs font-bold uppercase text-slate-400 hover:text-cyan-lf">Staff</button>
            <button onclick="show('galleries')" class="text-xs font-bold uppercase text-black">Galerías</button>
        </div>
    </nav>
    <main class="max-w-6xl mx-auto p-10">
        <!-- STAFF SECTION -->
        <section id="section-admin" class="hidden">
            <div class="bg-slate-900 p-10 rounded-3xl text-white flex justify-between items-center mb-10">
                <h2 class="text-2xl font-bold">Staff LenteFría</h2>
                <button onclick="document.getElementById('m-u').classList.remove('hidden')" class="bg-cyan-lf px-6 py-2 rounded-xl font-bold">+ NUEVO</button>
            </div>
            <div id="staff-list" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>

        <!-- GALLERIES SECTION -->
        <section id="section-galleries">
            <div class="flex justify-between items-end mb-10">
                <h2 class="text-5xl font-black">Entregas</h2>
                <button onclick="document.getElementById('m-g').classList.remove('hidden')" class="bg-black text-white px-8 py-4 rounded-3xl font-bold hover:bg-cyan-lf transition-all">NUEVA BÓVEDA</button>
            </div>
            <div id="galleries-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
        </section>
    </main>

    <!-- MODAL STAFF -->
    <div id="m-u" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
        <div class="bg-white p-10 rounded-3xl w-96">
            <h3 class="font-bold text-xl mb-4">Nuevo Staff</h3>
            <input id="sN" placeholder="Nombre completo" class="mb-4 p-4 bg-slate-100 rounded-xl w-full">
            <input id="sE" placeholder="Email" class="mb-6 p-4 bg-slate-100 rounded-xl w-full">
            <button onclick="apiS()" class="w-full bg-black text-white p-4 rounded-xl font-bold hover:bg-cyan-lf">CREAR</button>
            <button onclick="this.parentElement.parentElement.classList.add('hidden')" class="w-full mt-4 text-slate-400 font-bold">CANCELAR</button>
        </div>
    </div>

    <!-- MODAL GALLERIES -->
    <div id="m-g" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
        <div class="bg-white p-10 rounded-3xl w-96">
            <h3 class="font-bold text-xl mb-4">Nueva Bóveda</h3>
            <input id="cN" placeholder="Nombre del Cliente" class="mb-4 p-4 bg-slate-100 rounded-xl w-full">
            <input id="sl" placeholder="Slug (Ej: boda-carlos)" class="mb-4 p-4 bg-slate-100 rounded-xl w-full">
            <input id="ps" placeholder="Contraseña de acceso" class="mb-6 p-4 bg-slate-100 rounded-xl w-full">
            <button onclick="apiG()" class="w-full bg-cyan-lf text-white p-4 rounded-xl font-bold hover:bg-black">CREAR</button>
            <button onclick="this.parentElement.parentElement.classList.add('hidden')" class="w-full mt-4 text-slate-400 font-bold">CANCELAR</button>
        </div>
    </div>

    <script>
        // URL DE PRODUCCIÓN APPS SCRIPT
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzAEygb5pHlQ08emz8KqvEnYFl9uMv_4WhzYTEk8tqxdxfIxc8IYKq9c5iFv7EicfO4/exec";

        async function gasRequest(action, payload = null) {
            if (payload === null) {
                const r = await fetch(`${GAS_URL}?action=${action}`);
                return await r.json();
            } else {
                const r = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: action, payload: payload })
                });
                return await r.json();
            }
        }

        function show(n) { 
            document.getElementById('section-admin').classList.toggle('hidden', n!=='admin'); 
            document.getElementById('section-galleries').classList.toggle('hidden', n!=='galleries'); 
            if(n==='admin') fetchS(); 
        }

        async function fetchS() {
            try {
                const d = await gasRequest("getStaff");
                if(!Array.isArray(d)) throw new Error("Respuesta no es un array");
                document.getElementById('staff-list').innerHTML = d.map(s => 
                    `<div class="bg-slate-50 p-6 rounded-3xl border"><h4 class="font-bold">${s.full_name}</h4><p class="text-xs text-slate-400">${s.email}</p></div>`
                ).join('');
            } catch(e) { 
                document.getElementById('staff-list').innerHTML = `<p class="text-red-500 font-bold">Error: ${e.message}</p>`; 
            }
        }

        async function fetchG() {
            try {
                const d = await gasRequest("getGalleries");
                if(!Array.isArray(d)) throw new Error("Respuesta no es un array");
                document.getElementById('galleries-grid').innerHTML = d.map(g => 
                    `<div class="border p-6 rounded-3xl flex flex-col justify-between shadow-sm">
                        <div>
                            <h3 class="font-bold text-xl">${g.client_name}</h3>
                            <p class="text-xs text-slate-400 mb-4">/${g.slug}</p>
                        </div>
                        <button onclick="up(${g.id})" id="b-${g.id}" class="w-full bg-black text-white p-3 rounded-xl hover:bg-cyan-lf transition-all text-xs font-bold">
                            SUBIR FOTOS
                        </button>
                    </div>`
                ).join('');
            } catch(e) { 
                document.getElementById('galleries-grid').innerHTML = `<p class="text-red-500 font-bold">Error: ${e.message}</p>`; 
            }
        }

        function up(galleryId) {
            const input = document.createElement('input'); 
            input.type = 'file'; 
            input.multiple = true;
            input.accept = "image/*";

            input.onchange = async e => {
                const btn = document.getElementById(`b-${galleryId}`); 
                const files = e.target.files;
                if(files.length === 0) return;

                btn.innerText = `Subiendo 0/${files.length}...`;
                btn.disabled = true;
                btn.classList.add("opacity-50");

                for(let i=0; i<files.length; i++) {
                    const file = files[i];
                    const reader = new FileReader();
                    const base64Promise = new Promise((resolve) => {
                        reader.onload = () => resolve(reader.result.split(',')[1]);
                    });
                    reader.readAsDataURL(file);
                    const base64Data = await base64Promise;

                    btn.innerText = `Enviando ${i+1}/${files.length}...`;
                    const payload = {
                        gallery_id: galleryId,
                        filename: file.name,
                        mimeType: file.type,
                        base64Data: base64Data
                    };

                    try {
                        await gasRequest("uploadPhoto", payload);
                    } catch (error) {
                        console.error("Error subiendo foto", file.name, error);
                    }
                }

                btn.innerText = "¡LISTO!"; 
                btn.classList.remove("opacity-50");
                setTimeout(() => { btn.innerText = "SUBIR FOTOS"; btn.disabled = false; }, 3000);
            }; 
            input.click();
        }

        async function apiS() { 
            const payload = { full_name: document.getElementById('sN').value, email: document.getElementById('sE').value };
            await gasRequest("createStaff", payload);
            document.getElementById('m-u').classList.add('hidden'); 
            document.getElementById('sN').value = ''; document.getElementById('sE').value = '';
            fetchS(); 
        }

        async function apiG() { 
            const payload = { 
                client_name: document.getElementById('cN').value, 
                slug: document.getElementById('sl').value, 
                password: document.getElementById('ps').value, 
                can_download: true 
            };
            await gasRequest("createGallery", payload);
            document.getElementById('m-g').classList.add('hidden'); 
            document.getElementById('cN').value = ''; document.getElementById('sl').value = ''; document.getElementById('ps').value = '';
            fetchG(); 
        }
        
        // Ejecutar lectura inicial de Galerías al cargar la página
        fetchG();
    </script>
</body>
</html>
